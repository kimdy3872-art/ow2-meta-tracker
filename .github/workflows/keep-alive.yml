name: Keep Streamlit App Awake

on:
  schedule:
    # 6시간마다 실행 (12시간 슬립을 여유 있게 방지)
    - cron: '0 */6 * * *'
  # 수동 실행 (테스트용)
  workflow_dispatch:

# 동시 실행 방지: 이전 keep-alive가 겹치지 않도록
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Selenium
        run: |
          python -m pip install --upgrade pip
          pip install "selenium>=4.10.0"

      - name: Visit app to keep it awake
        env:
          APP_URL: https://ow2metatracker.streamlit.app
        run: python scripts/keep_alive.py
